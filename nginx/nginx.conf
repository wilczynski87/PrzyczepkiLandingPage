worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker internal DNS — defer upstream resolution to request time
    resolver 127.0.0.11 ipv6=off valid=10s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/wasm
        application/xml
        image/svg+xml;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # 🔹 Nagłówki wymagane dla WASM w Chrome (COEP/COOP)
        add_header Cross-Origin-Opener-Policy same-origin always;
        add_header Cross-Origin-Embedder-Policy require-corp always;

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # 🔹 Cache statycznych assetów
        location ~* \.(js|wasm|css|png|jpg|jpeg|svg|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # 🔹 API proxy (produkcja: frontend woła /api/*)
        location /api/ {
            set $api_upstream przyczepki_api:8090;
            proxy_pass http://$api_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 🔹 SPA routing (Compose Web / KMP)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 🔹 Healthcheck (opcjonalnie)
        location /health {
            access_log off;
            return 200 'OK';
        }

        location = /favicon.ico { log_not_found off; access_log off; }
    }
}
