# Konfiguracja aplikacji (DB, auth, email) pochodzi ze zmiennych środowiskowych — zob. toApiConfig() w ApiConfig.kt
# Docker: docker-compose.yaml (przyczepki_api.environment)

ktor {
  deployment {
    port = 8090
    port = ${?PORT}
    watch = [ classes ]
  }

  application {
    modules = [ com.example.przyczepki_landingpage.module ]
  }
}
