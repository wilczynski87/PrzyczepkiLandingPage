name: Deploy Przyczepki

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: nick-fields/retry@v3
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_PAT: ${{ secrets.DOCKER_PAT }}
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: echo "$DOCKER_PAT" | docker login -u "$DOCKER_USER" --password-stdin

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: wilczynski87/przyczepki-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/DockerfileServer
          push: true
          tags: wilczynski87/przyczepki-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.PRZYCZEPKI_WEB }}
          source: "docker-compose.yaml"
          target: "/przyczepki-landing-page/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
          WEB_PORT: ${{ secrets.WEB_PORT }}
          DB_HOST: przyczepki_db
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_AUTH_SOURCE: ${{ secrets.DB_AUTH_SOURCE }}
          AUTH_SECRET_LOGIN: ${{ secrets.AUTH_SECRET_LOGIN }}
          AUTH_SECRET_REFRESH: ${{ secrets.AUTH_SECRET_REFRESH }}
          AUTH_ISSUER: ${{ secrets.AUTH_ISSUER }}
          AUTH_AUDIENCE: ${{ secrets.AUTH_AUDIENCE }}
          AUTH_REALM: ${{ secrets.AUTH_REALM }}
          AUTH_ACCESS_TOKEN_EXPIRY: ${{ secrets.AUTH_ACCESS_TOKEN_EXPIRY }}
          AUTH_REFRESH_TOKEN_EXPIRY: ${{ secrets.AUTH_REFRESH_TOKEN_EXPIRY }}
          AUTH_GOOGLE_CLIENT_ID: ${{ secrets.AUTH_GOOGLE_CLIENT_ID }}
          AUTH_CLAIM: ${{ secrets.AUTH_CLAIM }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          WEB_HOST: przyczepki_web
          API_HOST: przyczepki_api
          API_PORT: ${{ secrets.API_PORT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.PRZYCZEPKI_WEB }}
          envs: APP_ENV,WEB_PORT,DB_HOST,DB_PORT,DB_NAME,DB_USER,DB_PASSWORD,DB_AUTH_SOURCE,AUTH_SECRET_LOGIN,AUTH_SECRET_REFRESH,AUTH_ISSUER,AUTH_AUDIENCE,AUTH_REALM,AUTH_ACCESS_TOKEN_EXPIRY,AUTH_REFRESH_TOKEN_EXPIRY,AUTH_GOOGLE_CLIENT_ID,AUTH_CLAIM,EMAIL_HOST,EMAIL_PORT,WEB_HOST,API_HOST,API_PORT
          script: |
            set -e
            cd /przyczepki-landing-page

            cat > .env << EOF
            APP_ENV=${APP_ENV:-prod}
            WEB_PORT=${WEB_PORT:-80}
            DB_HOST=${DB_HOST:-przyczepki_db}
            DB_PORT=${DB_PORT:-27017}
            DB_NAME=${DB_NAME:-przyczepki}
            DB_USER=${DB_USER:-admin}
            DB_PASSWORD=${DB_PASSWORD}
            DB_AUTH_SOURCE=${DB_AUTH_SOURCE:-admin}
            AUTH_SECRET_LOGIN=${AUTH_SECRET_LOGIN}
            AUTH_SECRET_REFRESH=${AUTH_SECRET_REFRESH}
            AUTH_ISSUER=${AUTH_ISSUER:-ktor}
            AUTH_AUDIENCE=${AUTH_AUDIENCE:-ktor}
            AUTH_REALM=${AUTH_REALM:-ktor}
            AUTH_ACCESS_TOKEN_EXPIRY=${AUTH_ACCESS_TOKEN_EXPIRY:-3600000}
            AUTH_REFRESH_TOKEN_EXPIRY=${AUTH_REFRESH_TOKEN_EXPIRY:-2592000000}
            AUTH_GOOGLE_CLIENT_ID=${AUTH_GOOGLE_CLIENT_ID}
            AUTH_CLAIM=${AUTH_CLAIM:-userId}
            EMAIL_HOST=${EMAIL_HOST:-localhost}
            EMAIL_PORT=${EMAIL_PORT:-8200}
            WEB_HOST=${WEB_HOST:-przyczepki_web}
            API_HOST=${API_HOST:-przyczepki_api}
            API_PORT=${API_PORT:-8090}
            EOF

            docker rm -f przyczepki-landing-page nginx-proxy-manager 2>/dev/null || true
            docker compose down --remove-orphans || true

            for i in 1 2 3; do
              docker pull wilczynski87/przyczepki-web:latest && break
              echo "Pull web failed (attempt $i), retrying in 30s..."
              sleep 30
            done

            for i in 1 2 3; do
              docker pull wilczynski87/przyczepki-api:latest && break
              echo "Pull api failed (attempt $i), retrying in 30s..."
              sleep 30
            done

            docker compose up -d --no-build --pull always