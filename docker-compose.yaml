#      - ./npm/data:/data
#      - ./npm/letsencrypt:/etc/letsencrypt
#    networks:
#      - przyczepki-network
#    restart: unless-stopped

  przyczepki_web:
    container_name: przyczepki-landing-page
#    image: wilczynski87/przyczepki-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    image: wilczynski87/przyczepki-web
    environment:
      - TZ=Europe/Warsaw
      - APP_ENV=dev
    networks:
      - przyczepki-network
    restart: unless-stopped
    ports:
      - "80:80"

  przyczepki_api:
#    image: wilczynski87/przyczepki-api:latest
    build:
      context: .
      dockerfile: server/DockerfileServer
    image: wilczynski87/przyczepki-api
    container_name: przyczepki_api
    environment:
      - TZ=Europe/Warsaw
      - MONGO_URI=mongodb://admin:admin@przyczepki_db:27017/przyczepki?authSource=admin
    networks:
      - przyczepki-network
    restart: unless-stopped
    depends_on:
      - przyczepki_db
    ports:
      - "8090:8090"

  przyczepki_db:
    image: mongo
    container_name: przyczepki_db
    restart: unless-stopped
    networks:
      - przyczepki-network
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    ports:
      - "27017:27017"

networks:
  przyczepki-network:
    driver: bridge