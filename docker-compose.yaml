services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    ports:
      - "80:80"
      - "81:81"    # panel admina
      - "443:443"
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    networks:
      - przyczepki-network
    restart: unless-stopped

  przyczepki_web:
    container_name: przyczepki_web
    build:
      context: .
      dockerfile: Dockerfile
    image: wilczynski87/przyczepki-web:latest
    environment:
      - TZ=Europe/Warsaw
      - APP_ENV=${APP_ENV:-dev}
    networks:
      - przyczepki-network
    restart: unless-stopped
    depends_on:
      - przyczepki_api
    expose:
      - "80"

  przyczepki_api:
    build:
      context: .
      dockerfile: server/DockerfileServer
    image: wilczynski87/przyczepki-api:latest
    container_name: przyczepki_api
    environment:
      - TZ=Europe/Warsaw
      - API_ENV=${APP_ENV:-dev}
      - DB_HOST=${DB_HOST:-przyczepki_db}
      - DB_PORT=${DB_PORT:-27017}
      - DB_NAME=${DB_NAME:-przyczepki}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_AUTH_SOURCE=${DB_AUTH_SOURCE:-admin}
      - AUTH_SECRET_LOGIN=${AUTH_SECRET_LOGIN}
      - AUTH_SECRET_REFRESH=${AUTH_SECRET_REFRESH}
      - AUTH_ISSUER=${AUTH_ISSUER}
      - AUTH_AUDIENCE=${AUTH_AUDIENCE}
      - AUTH_REALM=${AUTH_REALM}
      - AUTH_ACCESS_TOKEN_EXPIRY=${AUTH_ACCESS_TOKEN_EXPIRY:-3600000}
      - AUTH_REFRESH_TOKEN_EXPIRY=${AUTH_REFRESH_TOKEN_EXPIRY:-2592000000}
      - AUTH_CLAIM=${AUTH_CLAIM}
      - EMAIL_HOST=${EMAIL_HOST:-przyczepki_email}
      - EMAIL_PORT=${EMAIL_PORT:-8200}
      - WEB_HOST=${WEB_HOST:-przyczepki_web}
      - WEB_PORT=${WEB_PORT:-80}
      - API_HOST=${API_HOST:-przyczepki_api}
      - API_PORT=${API_PORT:-8090}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - PAYMENT_MERCHANT_ID=${PAYMENT_MERCHANT_ID}
      - PAYMENT_POS_ID=${PAYMENT_POS_ID}
      - PAYMENT_SECRET_ID=${PAYMENT_SECRET_ID}
      - PAYMENT_CRC=${PAYMENT_CRC}
      - PAYMENT_ENV=${PAYMENT_ENV:-production}
      - PAYMENT_MOCK=${PAYMENT_MOCK:-}
      - PAYMENT_URL_RETURN=${PAYMENT_URL_RETURN:-https://przyczepkifat.pl/podsumowanieRezerwacji}
      - PAYMENT_URL_STATUS=${PAYMENT_URL_STATUS:-https://przyczepkifat.pl/api/payment/notification}
      - GATE_OPEN_URL=${GATE_OPEN_URL:-}
      - GATE_OPEN_METHOD=${GATE_OPEN_METHOD:-PATCH}
      - GATE_ACCESS_TOKEN=${GATE_ACCESS_TOKEN:-${GATE_API_KEY:-}}
      - GATE_API_KEY=${GATE_API_KEY:-}
      - GATE_REQUEST_BODY=${GATE_REQUEST_BODY:-{"action":"OPEN_CLOSE"}}
      - GATE_MOCK=${GATE_MOCK:-}
      - GATE_COOLDOWN_SECONDS=${GATE_COOLDOWN_SECONDS:-60}
      - SUPLA_CLIENT_ID=${SUPLA_CLIENT_ID:-${SUPLA_ID:-}}
      - SUPLA_CLIENT_SECRET=${SUPLA_CLIENT_SECRET:-${SUPLA_SECRET:-}}
      - SUPLA_ID=${SUPLA_ID:-}
      - SUPLA_SECRET=${SUPLA_SECRET:-}
      - SUPLA_TOKEN_URL=${SUPLA_TOKEN_URL:-https://svr111.supla.org/oauth/v2/token}
      - SUPLA_REDIRECT_URI=${SUPLA_REDIRECT_URI:-}
      - SUPLA_REFRESH_TOKEN=${SUPLA_REFRESH_TOKEN:-}
      - SUPLA_OAUTH_HELPER=${SUPLA_OAUTH_HELPER:-false}
    networks:
      - przyczepki-network
    restart: unless-stopped
    depends_on:
      - przyczepki_db
    expose:
      - "${API_PORT:-8090}"

  przyczepki_db:
    image: mongo
    container_name: przyczepki_db
    restart: unless-stopped
    networks:
      - przyczepki-network
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    expose:
      - "${DB_PORT:-27017}"
    volumes:
      - przyczepki_mongo_data:/data/db

  przyczepki_email:
    image: wilczynski87/przyczepki-email:latest
    container_name: przyczepki_email
    restart: unless-stopped
    networks:
      - przyczepki-network
    environment:
      - EMAIL_ENV=${EMAIL_ENV:-dev}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - GMAIL_SENDER_EMAIL=${GMAIL_SENDER_EMAIL}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - BCC=${BCC:-}
      - EMAIL_PORT=${EMAIL_PORT:-8200}
      - API_HOST=${API_HOST:-przyczepki_api}
      - API_PORT=${API_PORT:-8090}
    expose:
      - "${EMAIL_PORT:-8200}"

networks:
  przyczepki-network:
    driver: bridge

volumes:
  przyczepki_mongo_data:


