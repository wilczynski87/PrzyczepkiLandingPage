  przyczepki_web:
    container_name: przyczepki_web
    build:
      context: .
      dockerfile: Dockerfile
    image: wilczynski87/przyczepki-web:latest
    environment:
      - TZ=Europe/Warsaw
      - APP_ENV=${APP_ENV:-dev}
    networks:
      - przyczepki-network
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:${WEB_PORT:-80}"

  przyczepki_api:
    build:
      context: .
      dockerfile: server/DockerfileServer
    image: wilczynski87/przyczepki-api:latest
    container_name: przyczepki_api
    environment:
      - TZ=Europe/Warsaw
      - API_ENV=${APP_ENV:-dev}
      - DB_HOST=${DB_HOST:-przyczepki_db}
      - DB_PORT=${DB_PORT:-27017}
      - DB_NAME=${DB_NAME:-przyczepki}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_AUTH_SOURCE=${DB_AUTH_SOURCE:-admin}
      - AUTH_SECRET_LOGIN=${AUTH_SECRET_LOGIN}
      - AUTH_SECRET_REFRESH=${AUTH_SECRET_REFRESH}
      - AUTH_ISSUER=${AUTH_ISSUER}
      - AUTH_AUDIENCE=${AUTH_AUDIENCE}
      - AUTH_REALM=${AUTH_REALM}
      - AUTH_ACCESS_TOKEN_EXPIRY=${AUTH_ACCESS_TOKEN_EXPIRY:-3600000}
      - AUTH_REFRESH_TOKEN_EXPIRY=${AUTH_REFRESH_TOKEN_EXPIRY:-2592000000}
      - AUTH_GOOGLE_CLIENT_ID=${AUTH_GOOGLE_CLIENT_ID}
      - AUTH_CLAIM=${AUTH_CLAIM}
      - EMAIL_HOST=${EMAIL_HOST:-przyczepki_email}
      - EMAIL_PORT=${EMAIL_PORT:-8200}
      - WEB_HOST=${WEB_HOST:-przyczepki_web}
      - WEB_PORT=${WEB_PORT:-80}
      - API_HOST=${API_HOST:-przyczepki_api}
      - API_PORT=${API_PORT:-8090}
    networks:
      - przyczepki-network
    restart: unless-stopped
    depends_on:
      - przyczepki_db
    ports:
      - "${API_PORT:-8090}:${API_PORT:-8090}"

  przyczepki_db:
    image: mongo
    container_name: przyczepki_db
    restart: unless-stopped
    networks:
      - przyczepki-network
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-27017}:${DB_PORT:-27017}"
    volumes:
      - przyczepki_mongo_data:/data/db

networks:
  przyczepki-network:
    driver: bridge

volumes:
  przyczepki_mongo_data:


